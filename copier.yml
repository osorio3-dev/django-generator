# =============================================================================
# django-generator — Copier template
# =============================================================================
# Genera un proyecto Django 6 listo para `copier update`.
# Schema de preguntas cerrado en DESIGN.md §9. MVP scope: base + admin=unfold.
# =============================================================================

_minimum_copier_version: "9.0"
_templates_suffix: ".jinja"

# Files/dirs at the generator root that must NEVER be copied into generated projects.
# Note: .gitignore and pyproject.toml are templates — they ARE copied to projects.
# Note: README.md and CHANGELOG.md live in docs/ — the generator's own docs,
# not templates. They are excluded as a whole folder so the root README.md.jinja
# can render to README.md in the generated project without colliding.
_exclude:
  - "copier.yml"
  - "copier.yaml"
  - "docs"
  - "scripts/validate_modules.py"
  - "slugify"
  - ".agents/atl/**"
  - ".agents/.skill-registry.cache.json"
  - ".codegraph/**"
  - ".git/**"
  - ".venv/**"
  - "__pycache__/**"
  - "*.pyc"
  - ".DS_Store"
  # Phantom artifact when admin=false: source filename
  # `{% if admin %}unfold{% else %}_unfold_disabled{% endif %}.py.jinja`
  # renders to `_unfold_disabled.py` which is excluded so the generated
  # `config/settings/` package contains exactly the 5 expected files.
  - "config/settings/_unfold_disabled.py"

# -----------------------------------------------------------------------------
# Project identity
# -----------------------------------------------------------------------------
project_name:
  type: str
  help: "Nombre legible del proyecto (ej: 'Facturación Online')"
  placeholder: "My Django Project"

project_slug:
  type: str
  help: "Identificador Python-safe (snake_case). Usado para carpeta raíz, paquete config, pyproject name. Default: derivado de project_name."
  default: "{% from 'slugify.jinja' import slugify %}{{ slugify(project_name) }}"
  validator: "{% if not (project_slug | regex_search('^[a-z][a-z0-9_]*$')) %}Use snake_case lowercase; start with a letter.{% endif %}"

author_name:
  type: str
  help: "Tu nombre o el del equipo (aparece en pyproject y LICENSE)"
  default: "Jhonatan Osorio"

python_version:
  type: str
  default: "3.13"
  choices:
    - "3.13"
    - "3.14"

django_version:
  type: str
  default: "6.0"
  choices:
    - "6.0"

# -----------------------------------------------------------------------------
# Upstream repo (computed, no prompt) — usado por README.md.jinja para el link
# "Generado con django-generator". Override con -d github_user=foo -d github_repo=bar.
# -----------------------------------------------------------------------------
github_user:
  type: str
  default: "osorio3-dev"
  when: false
  help: "Usuario/org de GitHub dueño del generador (sólo se usa si no se override por CLI)."

github_repo:
  type: str
  default: "django-generator"
  when: false
  help: "Nombre del repo del generador en GitHub."

database:
  type: str
  default: "postgresql"
  choices:
    - "postgresql"
    - "sqlite"
  help: "Motor de DB recomendado en .env.example. 'sqlite' sólo para prototipos; producción exige postgresql."
  validator: >-
    {% if database == 'sqlite' and (include_multitenant or 'module-multitenant' in optional_modules) -%}
    database=sqlite no es compatible con multitenant: schema-per-tenant requiere PostgreSQL. Usá database=postgresql.
    {%- endif %}

# -----------------------------------------------------------------------------
# Eje API (opt-in, default OFF)
# -----------------------------------------------------------------------------
api:
  type: bool
  default: false
  help: "¿Exponer una API HTTP? Si sí, se instala django-ninja."

# -----------------------------------------------------------------------------
# Eje Admin (opt-out, default ON)
# -----------------------------------------------------------------------------
admin:
  type: bool
  default: true
  help: "¿Necesitás panel admin? Si sí, se instala Unfold + allauth. Si NO, se omite django.contrib.admin."

admin_style:
  type: str
  default: "unfold"
  choices:
    - "unfold"
  when: "{{ admin }}"
  help: "Estilo del admin. Hoy sólo Unfold; mantener cerrado: el template NUNCA elige el admin de Django por defecto."

# -----------------------------------------------------------------------------
# Eje Frontend (opt-in, default OFF)
# -----------------------------------------------------------------------------
frontend:
  type: bool
  default: false
  help: "¿Necesitás UI renderizada? Sin frontend: API-only o scripts."

frontend_style:
  type: str
  default: "server-rendered"
  choices:
    - "server-rendered"
    - "vue-spa"
  when: "{{ frontend }}"
  help: "server-rendered = Preline + HTMX + Alpine + cotton. vue-spa = Vue 3 + Vite + Preline + django-vite."

package_manager:
  type: str
  default: "npm"
  choices:
    - "npm"
    - "bun"
  when: "{{ frontend }}"
  help: "Lockfile a generar. NUNCA ambos: si 'bun' se omite package-lock.json, y viceversa."

vue_router:
  type: str
  default: "history"
  choices:
    - "history"
    - "hash"
  when: "{{ frontend and frontend_style == 'vue-spa' }}"
  help: "Vue Router mode. 'history' = URLs limpias (/about). 'hash' = URLs con # (/about)."

# -----------------------------------------------------------------------------
# Fernet trigger
# -----------------------------------------------------------------------------
persists_sensitive_data:
  type: bool
  default: false
  help: "Si tu proyecto guarda secretos o datos sensibles en DB (tokens OAuth, API keys, magic-links, PII, etc.), respondé sí. Fernet + EncryptedCharField se instalan automáticamente."

# -----------------------------------------------------------------------------
# Background jobs
# -----------------------------------------------------------------------------
include_jobs:
  type: bool
  default: false
  help: "¿Necesitás cola de tareas (emails, webhooks, reports)? Instala django-q2 con broker ORM."

jobs_backend:
  type: str
  default: "orm"
  choices:
    - "orm"
    - "redis"
  when: "{{ include_jobs }}"
  help: "Broker de django-q2. 'orm' = tu DB existente, cero infra. 'redis' = requiere Redis."

# -----------------------------------------------------------------------------
# Módulos opt-in (atajos sí/no individuales)
#
# El usuario responde cada módulo como bool. Internamente se consolidan en
# `optional_modules` (computed, más abajo) para que las plantillas `.jinja`
# puedan seguir usando la convención `'module-X' in optional_modules`.
#
# El refactor del computed `optional_modules` se hizo para que el usuario
# NUNCA tenga que escribir JSON en el wizard. Cada módulo es una pregunta
# booleana explícita.
# -----------------------------------------------------------------------------
include_multitenant:
  type: bool
  default: false
  help: "¿SaaS multi-tenant? Activa el módulo multitenant. Equivale a listar module-multitenant en optional_modules, pero con sub-opción."

multitenant_isolation:
  type: str
  default: "logical"
  choices:
    - "logical"
    - "schema"
  when: "{{ include_multitenant }}"
  help: "logical = TenantMiddleware + TenantAwareModelMixin (un DB). schema = schema-per-tenant (usa django-multitenant)."

include_secure_endpoints:
  type: bool
  default: false
  help: "HMAC verifier + Idempotency-Key + AuditLog (apps/core/{idempotency,audit,webhooks}/). Activa Fernet."

include_wompi:
  type: bool
  default: false
  help: "State machine de pagos Wompi (Colombia) en apps/payments/wompi/. Activa Fernet."

include_ghl:
  type: bool
  default: false
  help: "OAuth + cliente v2 de GoHighLevel con retry/backoff en apps/integrations/ghl/. Activa Fernet."

include_supabase:
  type: bool
  default: false
  help: "Cliente Supabase (anon lectura + service_role mutación split) en apps/integrations/supabase/. Activa Fernet."

include_realtime:
  type: bool
  default: false
  help: "Channels + channels-redis en apps/realtime/ (cambia ASGI)."

include_django_guard:
  type: bool
  default: false
  help: "Permisos por objeto con django-guard."

include_autologin_tests360:
  type: bool
  default: false
  help: "Magic-links POST-only (NO GET) en apps/accounts/autologin/. Activa Fernet."

include_docker:
  type: bool
  default: false
  help: "Atajo para activar module-docker."

include_precommit:
  type: bool
  default: false
  help: "Atajo para activar module-precommit."

include_github_actions:
  type: bool
  default: false
  help: "Atajo para activar module-github-ci."

include_debug_toolbar:
  type: bool
  default: false
  help: "Atajo para activar module-debug-toolbar (sólo recomendado en dev local)."

# -----------------------------------------------------------------------------
# E2E opcional
# -----------------------------------------------------------------------------
include_playwright:
  type: bool
  default: false
  help: "¿Smoke tests E2E con Playwright? Recomendado sólo si frontend=vue-spa o hay flujo público crítico."

# -----------------------------------------------------------------------------
# Computed values (no prompt)
# -----------------------------------------------------------------------------
django_settings_module:
  type: str
  default: "config.settings"
  when: false
  help: "Ruta al paquete de settings. Default: 'config.settings' (el slug del proyecto es el nombre de la carpeta, no del paquete Python)."

# Consolidación de los atajos sí/no en una lista 'module-X' que las plantillas
# consumen con la convención `'module-X' in optional_modules`. Computed para que
# el usuario NUNCA tenga que escribir JSON en el wizard.
optional_modules:
  type: json
  default: >-
    {%- set mods = [] -%}
    {%- if include_multitenant %}{%- set _ = mods.append('module-multitenant') %}{%- endif -%}
    {%- if include_secure_endpoints %}{%- set _ = mods.append('module-secure-endpoints') %}{%- endif -%}
    {%- if include_wompi %}{%- set _ = mods.append('module-wompi') %}{%- endif -%}
    {%- if include_ghl %}{%- set _ = mods.append('module-ghl') %}{%- endif -%}
    {%- if include_supabase %}{%- set _ = mods.append('module-supabase') %}{%- endif -%}
    {%- if include_realtime %}{%- set _ = mods.append('module-realtime') %}{%- endif -%}
    {%- if include_django_guard %}{%- set _ = mods.append('module-django-guard') %}{%- endif -%}
    {%- if include_autologin_tests360 %}{%- set _ = mods.append('module-autologin-tests360') %}{%- endif -%}
    {%- if include_docker %}{%- set _ = mods.append('module-docker') %}{%- endif -%}
    {%- if include_precommit %}{%- set _ = mods.append('module-precommit') %}{%- endif -%}
    {%- if include_github_actions %}{%- set _ = mods.append('module-github-ci') %}{%- endif -%}
    {%- if include_debug_toolbar %}{%- set _ = mods.append('module-debug-toolbar') %}{%- endif -%}
    {{ mods | to_json }}
  when: false
  help: "Lista consolidada computed a partir de los atajos include_*. Las plantillas .jinja la consumen con 'module-X' in optional_modules."

# -----------------------------------------------------------------------------
# Confirmación
# -----------------------------------------------------------------------------
_confirm:
  type: bool
  default: true
  help: "Confirmar antes de generar."

_message_after_copy: |
  Proyecto "{{ project_slug }}" generado.

  Iniciá el .env con secrets random:
    ./scripts/init_env.sh         # o python scripts/init_env.py
    # o con --force para regenerar:  ./scripts/init_env.sh --force

  Próximos pasos:
    1. cd {{ project_slug }}
    2. ./scripts/init_env.sh
    3. uv sync  (o pip install -e .)
    4. python manage.py migrate
    5. python manage.py runserver

  Para re-aplicar el template más adelante:
    copier update
